<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYSCC Dispatch CAD</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="sidebar">
<h2>NYSCC</h2>
<button>Dashboard</button>
<button>Calls</button>
<button>Unit Board</button>
<button>Activity</button>
<button>Settings</button>
</div>

<div class="main">
<header>
<h1>New York State Communications Center</h1>
<div id="stats">Calls: <span id="callCount">2</span> | Units: <span id="unitCount">2</span></div>
</header>

<section class="grid">
<div class="panel">
<h3>Active Calls</h3>
<div id="calls"></div>
<button id="newCall">+ New Call (coming soon)</button>
</div>

<div class="panel">
<h3>Unit Board</h3>
<div id="units"></div>
</div>

<div class="panel full">
<h3>Activity Log</h3>
<div id="log"></div>
</div>
</section>
</div>

<script src="js/app.js"></script>
</body>
</html>
