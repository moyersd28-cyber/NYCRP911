<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>EmpireCAD v2</title>

    <link rel="icon"
          href="assets/favicon.ico">

    <link rel="stylesheet"
          href="css/main.css">

    <link rel="stylesheet"
          href="css/dashboard.css">

</head>

<body>

<!-- ===================================== -->
<!-- Sidebar                               -->
<!-- ===================================== -->

<div class="sidebar">

    <div class="logo">

        Empire<span>CAD</span>

    </div>

    <a class="active" href="dashboard.html">
        🏠 Dashboard
    </a>

    <a href="pages/calls.html">
        🚨 Calls
    </a>

    <a href="pages/units.html">
        🚓 Units
    </a>

    <a href="pages/map.html">
        🗺️ Map
    </a>

    <a href="pages/records.html">
        📁 Records
    </a>

    <a href="pages/admin.html">
        ⚙️ Admin
    </a>

</div>

<!-- ===================================== -->

<div class="main">

<div class="header">

    <h2>

        EmpireCAD Dashboard

    </h2>

    <div class="userBox">

        <div>

            <div id="userName">

                Loading...

            </div>

            <small
                id="userRole"
                style="color:#9ca3af">

                Dispatcher

            </small>

        </div>

        <button
            id="logoutButton"
            class="secondaryButton">

            Logout

        </button>

    </div>

</div>

<div class="content">

<div class="cards">

<div class="card">

<h3>

🚨 Active Calls

</h3>

<div
class="bigNumber"
id="activeCalls">

0

</div>

</div>

<div class="card">

<h3>

🚓 Police Units

</h3>

<div
class="bigNumber"
id="policeUnits">

0

</div>

</div>

<div class="card">

<h3>

🚒 Fire Units

</h3>

<div
class="bigNumber"
id="fireUnits">

0

</div>

</div>

<div class="card">

<h3>

🚑 EMS Units

</h3>

<div
class="bigNumber"
id="emsUnits">

0

</div>

</div>

</div>

<div class="tableCard">

<h2>

Recent Activity

</h2>

<table>

<thead>

<tr>

<th>

Time

</th>

<th>

User

</th>

<th>

Activity

</th>

</tr>

</thead>

<tbody
id="activityTable">

<tr>

<td colspan="3">

Loading activity...

</td>

</tr>

</tbody>

</table>

</div>

</div>

<div class="footer">

EmpireCAD v2

</div>

</div>

<script
type="module"
src="js/dashboard.js">

</script>

</body>

</html>
