<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>EmpireCAD v2 | Login</title>

    <link rel="icon" href="assets/favicon.ico">

    <link rel="stylesheet"
          href="css/main.css">

</head>

<body>

<div class="loginWrapper">

    <div class="loginCard">

        <h1>
            Empire<span style="color:#2563eb;">CAD</span>
        </h1>

        <p style="text-align:center;color:#9ca3af;margin-bottom:25px;">
            New York Communications Response Platform
        </p>

        <label>Email</label>

        <input
            id="email"
            type="email"
            placeholder="dispatcher@nycrp911.com">

        <label>Password</label>

        <input
            id="password"
            type="password"
            placeholder="Password">

        <div
            style="display:flex;
                   justify-content:space-between;
                   align-items:center;
                   margin-bottom:20px;">

            <label
                style="display:flex;
                       align-items:center;
                       gap:8px;
                       margin:0;">

                <input
                    id="remember"
                    type="checkbox"
                    style="width:auto;margin:0;">

                Remember Me

            </label>

        </div>

        <button
            class="primaryButton"
            style="width:100%;"
            id="loginButton">

            Login

        </button>

        <p
            id="statusMessage"
            style="
                text-align:center;
                color:#9ca3af;
                margin-top:20px;
                min-height:20px;
            ">
        </p>

        <hr
            style="
                margin:30px 0;
                border:0;
                border-top:1px solid #334155;
            ">

        <div
            style="
                text-align:center;
                color:#6b7280;
                font-size:14px;
            ">

            EmpireCAD v2

            <br>

            Professional Emergency Dispatch System

        </div>

    </div>

</div>

<script type="module">

import { login } from "./js/auth.js";

const email =
    document.getElementById("email");

const password =
    document.getElementById("password");

const button =
    document.getElementById("loginButton");

const status =
    document.getElementById("statusMessage");

button.onclick = async () => {

    button.disabled = true;

    status.innerHTML = "Signing in...";

    const user =
        await login(
            email.value.trim(),
            password.value
        );

    if(user){

        status.innerHTML =
            "Login successful...";

        window.location.href =
            "dashboard.html";

    }
    else{

        status.innerHTML =
            "Invalid email or password.";

        button.disabled = false;

    }

};

password.addEventListener(
    "keypress",
    function(event){

        if(event.key==="Enter"){

            button.click();

        }

    }
);

</script>

</body>

</html>
